<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Estudiantil Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', // Indigo 600
                        secondary: '#10B981', // Emerald 500
                        danger: '#EF4444', // Red 500
                        dark: '#1F2937', // Gray 800
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Login Overlay -->
    <div id="login-overlay"
        class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 transform transition-all">
            <div class="text-center mb-6">
                <div class="bg-primary/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-lock text-3xl text-primary"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Acceso Restringido</h2>
                <p class="text-gray-500 text-sm mt-2">Ingrese la contraseña para continuar</p>
            </div>

            <div class="space-y-4">
                <input type="password" id="password-input"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-center text-xl tracking-widest"
                    placeholder="••••" maxlength="4">
                <button id="login-btn"
                    class="w-full bg-primary hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-indigo-200">
                    Ingresar
                </button>
                <p id="login-error" class="text-danger text-sm text-center font-medium hidden">Contraseña incorrecta</p>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="app-content" class="hidden min-h-screen">
        <!-- App content will go here (Header, Stats, Search, Grid) -->
        <header class="bg-primary text-white shadow-md sticky top-0 z-30">
            <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-graduation-cap text-3xl"></i>
                    <h1 class="text-xl md:text-2xl font-bold">Directorio Estudiantil</h1>
                </div>

                <div class="relative w-full md:w-1/2 lg:w-96">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-search text-gray-300"></i>
                    </div>
                    <input type="text" id="search-input"
                        class="block w-full pl-10 pr-3 py-2 border border-transparent rounded-full leading-5 bg-white/20 text-white placeholder-gray-200 focus:outline-none focus:bg-white focus:text-gray-900 focus:placeholder-gray-400 sm:text-sm transition-colors duration-200"
                        placeholder="Buscar, preguntar o filtrar (ej. 15, femenino, colombiano)...">
                </div>
            </div>
            <!-- Filter Bar -->
            <div class="bg-indigo-800 border-t border-indigo-700 py-3">
                <div class="container mx-auto px-4 flex flex-wrap gap-3 items-center justify-center text-sm">
                    <div class="flex items-center gap-2 mr-2">
                        <i class="fa-solid fa-filter text-indigo-300"></i>
                        <span class="font-medium text-indigo-100 hidden sm:inline">Filtros:</span>
                    </div>
                    <select id="filter-edad"
                        class="bg-indigo-700 border border-indigo-600 text-white rounded-md px-3 py-1.5 focus:ring-2 focus:ring-white outline-none cursor-pointer max-w-[140px]">
                        <option value="">Todas las Edades</option>
                    </select>
                    <select id="filter-sexo"
                        class="bg-indigo-700 border border-indigo-600 text-white rounded-md px-3 py-1.5 focus:ring-2 focus:ring-white outline-none cursor-pointer max-w-[140px]">
                        <option value="">Cualquier Sexo</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Masculino">Masculino</option>
                    </select>
                    <select id="filter-nacionalidad"
                        class="bg-indigo-700 border border-indigo-600 text-white rounded-md px-3 py-1.5 focus:ring-2 focus:ring-white outline-none cursor-pointer max-w-[160px]">
                        <option value="">Nacionalidad</option>
                        <option value="Colombiano">Colombiano</option>
                        <option value="Extranjero">Extranjero</option>
                    </select>
                    <select id="filter-lugar"
                        class="bg-indigo-700 border border-indigo-600 text-white rounded-md px-3 py-1.5 focus:ring-2 focus:ring-white outline-none cursor-pointer max-w-[160px]">
                        <option value="">Lugar de Nac.</option>
                    </select>
                    <select id="filter-repitiendo"
                        class="bg-indigo-700 border border-indigo-600 text-white rounded-md px-3 py-1.5 focus:ring-2 focus:ring-white outline-none cursor-pointer max-w-[140px]">
                        <option value="">¿Repitente?</option>
                        <option value="Sí">Sí</option>
                        <option value="No">No</option>
                    </select>
                    <select id="filter-afro"
                        class="bg-indigo-700 border border-indigo-600 text-white rounded-md px-3 py-1.5 focus:ring-2 focus:ring-white outline-none cursor-pointer max-w-[160px]">
                        <option value="">¿Afrocolombiano?</option>
                        <option value="Sí">Sí</option>
                        <option value="No">No</option>
                    </select>
                    <select id="filter-indigena"
                        class="bg-indigo-700 border border-indigo-600 text-white rounded-md px-3 py-1.5 focus:ring-2 focus:ring-white outline-none cursor-pointer max-w-[140px]">
                        <option value="">¿Indígena?</option>
                        <option value="Sí">Sí</option>
                        <option value="No">No</option>
                    </select>
                    <select id="filter-desplazado"
                        class="bg-indigo-700 border border-indigo-600 text-white rounded-md px-3 py-1.5 focus:ring-2 focus:ring-white outline-none cursor-pointer max-w-[150px]">
                        <option value="">¿Desplazado?</option>
                        <option value="Sí">Sí</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8">
            <!-- Stats Section -->
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats-container">
                <!-- Stats injected by JS -->
            </section>

            <!-- Students Grid -->
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-700"><i
                            class="fa-solid fa-users mr-2 hover:text-primary transition-colors"></i>Listado de
                        Estudiantes</h2>
                    <span id="results-count"
                        class="text-sm text-gray-500 font-medium bg-gray-200 px-3 py-1 rounded-full">0 resultados</span>
                </div>
                <div id="students-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Cards injected by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Student Detail Modal -->
    <div id="student-modal"
        class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden flex items-center justify-center z-50 backdrop-blur-sm p-4 overflow-y-auto">
        <div
            class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full my-8 transform transition-all overflow-hidden relative">

            <button id="close-modal"
                class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center transition-colors z-10">
                <i class="fa-solid fa-times"></i>
            </button>

            <div id="modal-content" class="max-h-[85vh] overflow-y-auto">
                <!-- Modal content injected by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
